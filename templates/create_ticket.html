{% extends "base.html" %}

{% block title %}Comprar Boleto{% endblock %}

{% block content %}
<style>
    .form-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 450px; margin: 40px auto; }
    .form-container label { display: block; margin-top: 15px; font-weight: 600; color: #333; }
    .form-container input, .form-container select { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
    .form-container button { width: 100%; padding: 14px; margin-top: 25px; background: #2e7d32; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.2s; }
    .form-container button:hover { background: #1b5e20; }
    .back-link { display: block; text-align: center; margin-top: 20px; color: #5a7c5e; text-decoration: none; font-weight: 500; }
    .back-link:hover { text-decoration: underline; }
</style>

<div class="container">
    <h2 style="text-align: center; margin-top: 20px; color: #2a2a2a;">Venta de Boletos - Sucursal {{ sucursal_id }}</h2>

    <div class="form-container">
        <form method="POST" action="{{ url_for('main.comprar_boleto', sucursal_id=sucursal_id) }}">

            <label for="nombre_visitante">Nombre del Visitante:</label>
            <input type="text" id="nombre_visitante" name="nombre_visitante" required placeholder="Ej: Juan Pérez">

            <label for="correo">Correo Electrónico:</label>
            <input type="email" id="correo" name="correo" required placeholder="Ej: juan@email.com">

            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono" required placeholder="Ej: 5512345678">

            <label for="tipo_boleto">Tipo de Boleto:</label>
            <select id="tipo_boleto" name="tipo_boleto" required>
                <option value="Adulto">Adulto</option>
                <option value="Niño">Niño</option>
                <option value="Tercera Edad">Tercera Edad</option>
            </select>

            <label for="cantidad">Cantidad:</label>
            <input type="number" id="cantidad" name="cantidad" min="1" max="20" required value="1">

            <button type="submit">Comprar Boletos</button>
        </form>
        <a href="{{ url_for('main.index') }}" class="back-link">← Volver a Sucursales</a>
    </div>
</div>
{% endblock %}
