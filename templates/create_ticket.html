<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprar Boleto</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 20px; }
        .form-container { background: white; padding: 20px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select, button { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-size: 16px; }
        button:hover { background: #0056b3; }
        .back-link { display: block; text-align: center; margin-top: 10px; color: #666; text-decoration: none; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">Venta de Boletos - Sucursal {{ sucursal_id }}</h2>

    <div class="form-container">
        <form method="POST" action="{{ url_for('comprar_boleto', sucursal_id=sucursal_id) }}">

            <label for="nombre_visitante">Nombre del Visitante:</label>
            <input type="text" id="nombre_visitante" name="nombre_visitante" required placeholder="Ej: Juan Pérez">

            <label for="tipo_boleto">Tipo de Boleto:</label>
            <select id="tipo_boleto" name="tipo_boleto" required>
                <option value="Adulto">Adulto</option>
                <option value="Niño">Niño</option>
                <option value="Tercera Edad">Tercera Edad</option>
            </select>

            <label for="cantidad">Cantidad:</label>
            <input type="number" id="cantidad" name="cantidad" min="1" max="20" required value="1">

            <button type="submit">Comprar Boletos</button>
        </form>
        <a href="{{ url_for('index') }}" class="back-link">Volver a Sucursales</a>
    </div>

</body>
</html>
