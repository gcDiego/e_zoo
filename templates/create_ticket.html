{% extends "base.html" %}

{% block title %}Comprar Boleto - Zoológicos{% endblock %}

{% block content %}
<main class="container">
    <h2 class="section-title">Venta de Boletos</h2>
    <p style="text-align: center; color: #555; margin-bottom: 20px;">Estás comprando boletos para: <strong>{{ nombre_zoo }}</strong></p>

    <div class="form-container">
        <form method="POST" action="{{ url_for('comprar_boleto', id_zoologico=id_zoologico) }}">

            <label for="nombre_usuario">Nombre del Usuario:</label>
            <input type="text" id="nombre_usuario" name="nombre_usuario" required placeholder="Ej: Juan Pérez" maxlength="60">

            <label for="correo_electronico">Correo Electrónico:</label>
            <input type="email" id="correo_electronico" name="correo_electronico" required placeholder="ejemplo@correo.com" maxlength="80">

            <label for="n_telefono">Número de Teléfono:</label>
            <input type="tel" id="n_telefono" name="n_telefono" required placeholder="Ej: 5512345678" maxlength="20">

            <button type="submit">Finalizar Compra</button>
        </form>
        <a href="{{ url_for('index') }}" class="back-link">← Volver a Sucursales</a>
    </div>
</main>
{% endblock %}
